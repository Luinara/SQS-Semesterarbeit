# ─────────────────────────────────────────────────────────────────────────────
# SonarQube / SonarCloud – single project for the entire monorepo
#
# Covers both the Java backend (Spring Boot) and the TypeScript/React frontend
# in one SonarQube project.  The CI pipeline (sonarqube job in ci.yml) uses the
# sonarsource/sonarqube-scan-action with this file as the project descriptor.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SONAR_TOKEN     – SonarQube / SonarCloud authentication token
#   SONAR_HOST_URL  – server URL  (e.g. https://sonarcloud.io)
# ─────────────────────────────────────────────────────────────────────────────

sonar.projectKey=sqs-semesterarbeit
sonar.projectName=SQS Semesterarbeit

# ── Sources ───────────────────────────────────────────────────────────────────
# Java backend main sources + TypeScript/React frontend sources
sonar.sources=backend/src/main/java,frontend/src

# ── Tests ─────────────────────────────────────────────────────────────────────
sonar.tests=backend/src/test/java,tests/unit

# ── Java analysis ─────────────────────────────────────────────────────────────
# Compiled class files – produced by `mvn compile` in the sonarqube CI job.
sonar.java.binaries=backend/target/classes

# JaCoCo XML coverage report – produced by `mvn verify` in backend-test.
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml

# ── TypeScript / JavaScript analysis ──────────────────────────────────────────
# LCOV coverage report – produced by `npm run test:coverage` in frontend-test.
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# ── Exclusions ────────────────────────────────────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/playwright-report/**,\
  **/target/**

sonar.sourceEncoding=UTF-8
