<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="360" viewBox="0 0 1000 360" role="img" aria-labelledby="title desc">
  <title id="title">C4 Frontend Components</title>
  <desc id="desc">Frontend-Komponentendiagramm fuer das Angular Frontend.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#344054"/></marker><style>.bg{fill:#f8fafc}.group{fill:#fff;stroke:#98a2b3;stroke-width:2;stroke-dasharray:8 6;rx:16}.box{fill:#eef2ff;stroke:#4357ad;stroke-width:2;rx:10}.browser{fill:#fff0d6;stroke:#b66a00;stroke-width:2;rx:12}.api{fill:#dff3ff;stroke:#1677a3;stroke-width:2;rx:12}.title{font:700 24px Arial,sans-serif;fill:#101828}.label{font:700 15px Arial,sans-serif;fill:#101828}.small{font:13px Arial,sans-serif;fill:#475467}.arrow{stroke:#344054;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.dash{stroke-dasharray:7 6}</style></defs>
  <rect class="bg" width="1000" height="360"/><text x="40" y="45" class="title">Frontend Component View</text>
  <rect x="40" y="145" width="120" height="65" class="browser"/><text x="100" y="182" text-anchor="middle" class="label">Browser</text>
  <rect x="220" y="80" width="610" height="220" class="group"/><text x="245" y="110" class="label">Angular Frontend</text>
  <rect x="255" y="145" width="95" height="55" class="box"/><text x="302" y="168" text-anchor="middle" class="label">Routing</text><text x="302" y="187" text-anchor="middle" class="small">Routes</text>
  <rect x="385" y="145" width="95" height="55" class="box"/><text x="432" y="168" text-anchor="middle" class="label">Guards</text><text x="432" y="187" text-anchor="middle" class="small">Auth</text>
  <rect x="515" y="145" width="95" height="55" class="box"/><text x="562" y="168" text-anchor="middle" class="label">Pages</text><text x="562" y="187" text-anchor="middle" class="small">Views</text>
  <rect x="645" y="145" width="140" height="55" class="box"/><text x="715" y="168" text-anchor="middle" class="label">State Services</text><text x="715" y="187" text-anchor="middle" class="small">AppState</text>
  <rect x="440" y="235" width="190" height="50" class="box"/><text x="535" y="255" text-anchor="middle" class="label">Dashboard Components</text><text x="535" y="274" text-anchor="middle" class="small">TaskList, PetCard</text>
  <rect x="660" y="235" width="125" height="50" class="box"/><text x="722" y="255" text-anchor="middle" class="label">Models</text><text x="722" y="274" text-anchor="middle" class="small">User, Task, Pet</text>
  <rect x="865" y="235" width="95" height="50" class="api"/><text x="912" y="256" text-anchor="middle" class="label">Backend</text><text x="912" y="275" text-anchor="middle" class="small">geplant</text>
  <path d="M160 178 H255" class="arrow"/><path d="M350 173 H385" class="arrow"/><path d="M480 173 H515" class="arrow"/><path d="M610 173 H645" class="arrow"/><path d="M562 200 V235" class="arrow"/><path d="M715 200 V235" class="arrow"/><path d="M785 260 H865" class="arrow dash"/>
</svg>
