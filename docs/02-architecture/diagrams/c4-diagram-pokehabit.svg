    <text x="772.5" y="458" text-anchor="middle" class="label">Browser</text>
    <text x="772.5" y="475" text-anchor="middle" class="tiny">Nutzerzugriff</text>

    <rect x="855" y="400" width="375" height="155" class="group"/>
