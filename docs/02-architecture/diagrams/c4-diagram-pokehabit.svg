<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
    <title id="title">C4 Diagram - PokeHabit</title>
    <desc id="desc">Kombiniertes C4-Diagramm für PokeHabit mit Kontext-, Container-, Backend-Komponenten-, Frontend-Komponenten- und Deployment-Sicht.</desc>

    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#344054"/>
        </marker>
        <style>
            .bg{fill:#f8fafc}
            .panel{fill:#ffffff;stroke:#cbd5e1;stroke-width:2;rx:14}
            .group{fill:#ffffff;stroke:#98a2b3;stroke-width:2;stroke-dasharray:8 6;rx:14}
            .person{fill:#fff0d6;stroke:#b66a00;stroke-width:2;rx:10}
            .system{fill:#dff3ff;stroke:#1677a3;stroke-width:2;rx:10}
            .frontend{fill:#e7f8ef;stroke:#138a4e;stroke-width:2;rx:10}
            .backend{fill:#e8f1ff;stroke:#0d6efd;stroke-width:2;rx:10}
            .component{fill:#eef2ff;stroke:#4357ad;stroke-width:2;rx:10}
            .external{fill:#f4e7ff;stroke:#7a3fb0;stroke-width:2;rx:10}
            .db{fill:#fff5e8;stroke:#b65f00;stroke-width:2}
            .host{fill:#fff0d6;stroke:#b66a00;stroke-width:2;rx:10}
            .title{font:700 28px Arial,sans-serif;fill:#101828}
            .subtitle{font:14px Arial,sans-serif;fill:#475467}
            .panel-title{font:700 18px Arial,sans-serif;fill:#101828}
            .label{font:700 14px Arial,sans-serif;fill:#101828}
            .small{font:12px Arial,sans-serif;fill:#475467}
            .tiny{font:11px Arial,sans-serif;fill:#475467}
            .arrow{stroke:#344054;stroke-width:2;fill:none;marker-end:url(#arrow)}
            .dash{stroke-dasharray:7 6}
        </style>
    </defs>

    <rect class="bg" width="1400" height="980"/>

    <text x="55" y="55" class="title">C4 Diagram - PokeHabit</text>
    <text x="55" y="78" class="subtitle">Angular Frontend, Spring Boot Backend, PostgreSQL, PokeAPI, Open-Meteo und Docker Compose</text>

    <!-- Level 1 -->
    <rect x="40" y="105" width="620" height="205" class="panel"/>
    <text x="70" y="140" class="panel-title">Level 1: System Context</text>

    <rect x="80" y="180" width="135" height="70" class="person"/>
    <text x="147.5" y="207" text-anchor="middle" class="label">Nutzer</text>
    <text x="147.5" y="226" text-anchor="middle" class="small">Browser</text>

    <rect x="305" y="165" width="180" height="95" class="system"/>
    <text x="395" y="196" text-anchor="middle" class="label">PokeHabit</text>
    <text x="395" y="216" text-anchor="middle" class="small">Aufgaben, Fortschritt</text>
    <text x="395" y="234" text-anchor="middle" class="small">und Pokemon-Gamification</text>

    <rect x="535" y="135" width="100" height="62" class="external"/>
    <text x="585" y="160" text-anchor="middle" class="label">PokeAPI</text>
    <text x="585" y="178" text-anchor="middle" class="small">REST</text>

    <rect x="535" y="230" width="100" height="62" class="external"/>
    <text x="585" y="255" text-anchor="middle" class="label">Open-Meteo</text>
    <text x="585" y="273" text-anchor="middle" class="small">Wetter</text>

    <path d="M215 215 H305" class="arrow"/>
    <text x="260" y="203" text-anchor="middle" class="tiny">nutzt</text>

    <path d="M485 195 C510 180,515 166,535 166" class="arrow"/>
    <text x="515" y="150" text-anchor="middle" class="tiny">liest Daten</text>

    <path d="M485 230 C510 245,515 261,535 261" class="arrow"/>
    <text x="515" y="286" text-anchor="middle" class="tiny">liest Wetter</text>

    <!-- Level 2 -->
    <rect x="700" y="105" width="660" height="205" class="panel"/>
    <text x="730" y="140" class="panel-title">Level 2: Container</text>

    <rect x="735" y="160" width="450" height="115" class="group"/>
    <text x="755" y="184" class="tiny">PokeHabit</text>

    <rect x="775" y="205" width="120" height="50" class="frontend"/>
    <text x="835" y="226" text-anchor="middle" class="label">Frontend</text>
    <text x="835" y="243" text-anchor="middle" class="tiny">Angular</text>

    <rect x="945" y="205" width="125" height="50" class="backend"/>
    <text x="1007.5" y="226" text-anchor="middle" class="label">Backend API</text>
    <text x="1007.5" y="243" text-anchor="middle" class="tiny">Spring Boot</text>

    <ellipse cx="1140" cy="230" rx="48" ry="29" class="db"/>
    <text x="1140" y="226" text-anchor="middle" class="label">PostgreSQL</text>
    <text x="1140" y="243" text-anchor="middle" class="tiny">Persistenz</text>

    <rect x="1225" y="145" width="105" height="54" class="external"/>
    <text x="1277.5" y="168" text-anchor="middle" class="label">PokeAPI</text>
    <text x="1277.5" y="185" text-anchor="middle" class="tiny">extern</text>

    <rect x="1225" y="235" width="105" height="54" class="external"/>
    <text x="1277.5" y="258" text-anchor="middle" class="label">Open-Meteo</text>
    <text x="1277.5" y="275" text-anchor="middle" class="tiny">extern</text>

    <path d="M895 230 H945" class="arrow"/>
    <text x="920" y="218" text-anchor="middle" class="tiny">REST / JSON</text>

    <path d="M1070 230 H1092" class="arrow"/>
    <text x="1081" y="218" text-anchor="middle" class="tiny">JPA</text>

    <path d="M1070 215 C1120 165,1180 158,1225 172" class="arrow"/>
    <text x="1160" y="148" text-anchor="middle" class="tiny">HTTPS</text>

    <path d="M1070 245 C1120 285,1180 280,1225 262" class="arrow"/>
    <text x="1160" y="298" text-anchor="middle" class="tiny">HTTPS</text>

