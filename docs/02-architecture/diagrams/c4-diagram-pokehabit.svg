    <text x="1180" y="465" text-anchor="middle" class="label">State</text>
    <text x="1180" y="482" text-anchor="middle" class="tiny">Services</text>

    <rect x="915" y="510" width="155" height="42" class="frontend"/>
    <text x="992.5" y="528" text-anchor="middle" class="label">Dashboard</text>
    <text x="992.5" y="544" text-anchor="middle" class="tiny">TaskList, PetCard</text>

    <rect x="1095" y="510" width="115" height="42" class="component"/>
    <text x="1152.5" y="528" text-anchor="middle" class="label">Models</text>
    <text x="1152.5" y="544" text-anchor="middle" class="tiny">User, Task, Weather</text>

    <rect x="1245" y="445" width="90" height="48" class="system"/>
    <text x="1290" y="465" text-anchor="middle" class="label">Backend API</text>
    <text x="1290" y="482" text-anchor="middle" class="tiny">REST</text>

    <path d="M825 462 H880" class="arrow"/>
    <text x="852" y="450" text-anchor="middle" class="tiny">nutzt</text>

    <path d="M952 469 H975" class="arrow"/>
    <path d="M1047 469 H1070" class="arrow"/>
    <path d="M1142 469 H1145" class="arrow"/>
    <path d="M1106 493 C1106 505,1030 505,1030 510" class="arrow"/>
    <path d="M1180 493 V510" class="arrow"/>
    <path d="M1215 469 H1245" class="arrow dash"/>
    <text x="1230" y="457" text-anchor="middle" class="tiny">REST</text>

    <!-- Deployment -->
    <rect x="700" y="625" width="660" height="285" class="panel"/>
    <text x="730" y="660" class="panel-title">Deployment</text>

    <rect x="720" y="735" width="145" height="62" class="host"/>
