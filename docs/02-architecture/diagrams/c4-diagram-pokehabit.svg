    <text x="230" y="428" class="tiny">Spring Boot Backend</text>

    <rect x="240" y="455" width="95" height="50" class="component"/>
    <text x="287.5" y="475" text-anchor="middle" class="label">Controller</text>
    <text x="287.5" y="492" text-anchor="middle" class="tiny">REST</text>

    <rect x="385" y="455" width="95" height="50" class="component"/>
    <text x="432.5" y="475" text-anchor="middle" class="label">Service</text>
    <text x="432.5" y="492" text-anchor="middle" class="tiny">Businesslogik</text>

    <rect x="505" y="455" width="70" height="50" class="component"/>
    <text x="540" y="475" text-anchor="middle" class="label">Domain</text>
    <text x="540" y="492" text-anchor="middle" class="tiny">User, Task</text>

    <rect x="240" y="545" width="95" height="50" class="component"/>
    <text x="287.5" y="565" text-anchor="middle" class="label">Security</text>
    <text x="287.5" y="582" text-anchor="middle" class="tiny">Auth / CORS</text>

    <rect x="385" y="545" width="95" height="50" class="component"/>
    <text x="432.5" y="565" text-anchor="middle" class="label">Repository</text>
    <text x="432.5" y="582" text-anchor="middle" class="tiny">JPA</text>

    <rect x="505" y="545" width="70" height="50" class="component"/>
    <text x="540" y="565" text-anchor="middle" class="label">Integration</text>
    <text x="540" y="582" text-anchor="middle" class="tiny">Clients</text>

    <ellipse cx="432.5" cy="705" rx="62" ry="28" class="db"/>
    <text x="432.5" y="701" text-anchor="middle" class="label">PostgreSQL</text>
    <text x="432.5" y="718" text-anchor="middle" class="tiny">Daten</text>

    <rect x="505" y="665" width="95" height="45" class="external"/>
    <text x="552.5" y="684" text-anchor="middle" class="label">PokeAPI</text>
    <text x="552.5" y="700" text-anchor="middle" class="tiny">extern</text>

    <rect x="505" y="725" width="95" height="45" class="external"/>
    <text x="552.5" y="744" text-anchor="middle" class="label">Open-Meteo</text>
    <text x="552.5" y="760" text-anchor="middle" class="tiny">extern</text>

    <path d="M170 538 H240" class="arrow"/>
    <text x="205" y="526" text-anchor="middle" class="tiny">REST</text>

    <path d="M335 480 H385" class="arrow"/>
    <path d="M480 480 H505" class="arrow"/>

    <path d="M287.5 545 V505" class="arrow dash"/>
    <text x="310" y="531" text-anchor="middle" class="tiny">schützt</text>

    <path d="M432.5 505 V545" class="arrow"/>
    <path d="M480 570 H505" class="arrow"/>
    <path d="M432.5 595 V677" class="arrow"/>
    <path d="M540 595 V665" class="arrow"/>
    <path d="M575 570 C620 610,620 742,600 747" class="arrow"/>

