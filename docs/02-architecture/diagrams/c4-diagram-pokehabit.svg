    <rect x="1040" y="755" width="80" height="45" class="backend"/>
    <text x="1080" y="773" text-anchor="middle" class="label">Backend</text>
    <text x="1080" y="789" text-anchor="middle" class="tiny">8181</text>

    <ellipse cx="1165" cy="778" rx="42" ry="25" class="db"/>
