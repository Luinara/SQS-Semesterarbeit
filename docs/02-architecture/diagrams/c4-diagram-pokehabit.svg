    <rect x="880" y="445" width="72" height="48" class="component"/>
    <text x="916" y="465" text-anchor="middle" class="label">Routing</text>
    <text x="916" y="482" text-anchor="middle" class="tiny">Routes</text>

    <rect x="975" y="445" width="72" height="48" class="component"/>
    <text x="1011" y="465" text-anchor="middle" class="label">Guards</text>
    <text x="1011" y="482" text-anchor="middle" class="tiny">Auth</text>

    <rect x="1070" y="445" width="72" height="48" class="component"/>
    <text x="1106" y="465" text-anchor="middle" class="label">Pages</text>
    <text x="1106" y="482" text-anchor="middle" class="tiny">Views</text>

