    <text x="1287.5" y="842" text-anchor="middle" class="tiny">Internet</text>

    <path d="M865 766 H930" class="arrow"/>
    <text x="897" y="754" text-anchor="middle" class="tiny">localhost:3000</text>

    <path d="M1010 778 H1040" class="arrow"/>
    <text x="1025" y="766" text-anchor="middle" class="tiny">REST</text>

    <path d="M1120 778 H1123" class="arrow"/>
    <text x="1120" y="766" text-anchor="middle" class="tiny">JDBC</text>

    <path d="M1120 762 C1165 715,1200 710,1240 719" class="arrow"/>
