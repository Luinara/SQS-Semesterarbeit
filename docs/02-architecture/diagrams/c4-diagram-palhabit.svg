<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
    <title id="title">C4 Diagram - PalHabit</title>
    <desc id="desc">Kombiniertes C4-Diagramm für PalHabit mit Kontext-, Container-, Backend-Komponenten-, Frontend-Komponenten- und Deployment-Sicht. PalAPI ist keine Laufzeitabhängigkeit, sondern ursprüngliche Datenquelle für Pal-Stammdaten.</desc>

