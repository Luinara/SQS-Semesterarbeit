<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="430" viewBox="0 0 1260 430" role="img" aria-labelledby="title desc">
  <title id="title">C4 Frontend Components</title>
  <desc id="desc">Frontend-Komponentendiagramm für das Angular Frontend.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#344054"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}
      .group{fill:#fff;stroke:#98a2b3;stroke-width:2;stroke-dasharray:8 6;rx:16}
      .box{fill:#eef2ff;stroke:#4357ad;stroke-width:2;rx:10}
      .browser{fill:#fff0d6;stroke:#b66a00;stroke-width:2;rx:12}
      .api{fill:#dff3ff;stroke:#1677a3;stroke-width:2;rx:12}
      .title{font:700 24px Arial,sans-serif;fill:#101828}
      .label{font:700 15px Arial,sans-serif;fill:#101828}
      .small{font:12px Arial,sans-serif;fill:#475467}
      .arrow{stroke:#344054;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .dash{stroke-dasharray:7 6}
    </style>
  </defs>

  <rect class="bg" width="1260" height="430"/>
  <text x="40" y="45" class="title">Frontend Component View</text>

  <!-- Browser: aligned with top row -->
  <rect x="50" y="135" width="140" height="72" class="browser"/>
  <text x="120" y="163" text-anchor="middle" class="label">Browser</text>
  <text x="120" y="183" text-anchor="middle" class="small">Nutzerzugriff</text>

  <!-- Angular Frontend Group -->
  <rect x="220" y="75" width="810" height="300" class="group"/>
  <text x="245" y="105" class="label">Angular Frontend</text>

  <!-- Top row -->
  <rect x="290" y="135" width="135" height="72" class="box"/>
  <text x="357.5" y="160" text-anchor="middle" class="label">Routing</text>
  <text x="357.5" y="179" text-anchor="middle" class="small">
    <tspan x="357.5" dy="0">Splash, Auth,</tspan>
    <tspan x="357.5" dy="14">Dashboard</tspan>
  </text>

  <rect x="455" y="135" width="145" height="72" class="box"/>
  <text x="527.5" y="160" text-anchor="middle" class="label">Guards</text>
  <text x="527.5" y="179" text-anchor="middle" class="small">
    <tspan x="527.5" dy="0">authGuard,</tspan>
    <tspan x="527.5" dy="14">guestGuard</tspan>
  </text>

  <rect x="630" y="130" width="170" height="82" class="box"/>
  <text x="715" y="157" text-anchor="middle" class="label">Pages</text>
  <text x="715" y="176" text-anchor="middle" class="small">
    <tspan x="715" dy="0">SplashPage,</tspan>
    <tspan x="715" dy="14">AuthPage,</tspan>
    <tspan x="715" dy="14">DashboardPage</tspan>
  </text>

  <rect x="825" y="125" width="145" height="92" class="box"/>
  <text x="897.5" y="152" text-anchor="middle" class="label">State &amp; Services</text>
  <text x="897.5" y="173" text-anchor="middle" class="small">
    <tspan x="897.5" dy="0">AppStateService,</tspan>
    <tspan x="897.5" dy="14">BackendApiService</tspan>
  </text>

  <!-- Bottom row -->
  <rect x="355" y="255" width="290" height="78" class="box"/>
  <text x="500" y="281" text-anchor="middle" class="label">Dashboard Components</text>
  <text x="500" y="301" text-anchor="middle" class="small">
    <tspan x="500" dy="0">TopBar, TaskList,</tspan>
    <tspan x="500" dy="14">TaskCard, PetCard,</tspan>
    <tspan x="500" dy="14">PetVisual</tspan>
  </text>

  <rect x="680" y="255" width="150" height="72" class="box"/>
  <text x="755" y="280" text-anchor="middle" class="label">Shared UI</text>
  <text x="755" y="299" text-anchor="middle" class="small">
    <tspan x="755" dy="0">Button,</tspan>
    <tspan x="755" dy="14">ProgressBar, StatBadge</tspan>
  </text>

  <rect x="860" y="250" width="125" height="82" class="box"/>
  <text x="922.5" y="276" text-anchor="middle" class="label">Models</text>
  <text x="922.5" y="296" text-anchor="middle" class="small">
    <tspan x="922.5" dy="0">User, Auth,</tspan>
    <tspan x="922.5" dy="14">Task, Pet,</tspan>
    <tspan x="922.5" dy="14">AppState, Weather</tspan>
  </text>

  <!-- Backend API: aligned with top row -->
  <rect x="1080" y="135" width="145" height="72" class="api"/>
  <text x="1152.5" y="161" text-anchor="middle" class="label">Backend API</text>
  <text x="1152.5" y="181" text-anchor="middle" class="small">REST / JSON</text>

  <!-- Arrows -->
  <!-- Browser -> Routing -->
  <path d="M190 171 H290" class="arrow"/>
  <text x="240" y="159" text-anchor="middle" class="small">nutzt</text>

  <!-- Top row -->
  <path d="M425 171 H455" class="arrow"/>
  <path d="M600 171 H630" class="arrow"/>
  <path d="M800 171 H825" class="arrow"/>

  <!-- Pages -> Dashboard Components -->
  <path d="M695 212 C695 225, 650 232, 605 255" class="arrow"/>

  <!-- Pages -> Shared UI -->
  <path d="M735 212 C735 225, 745 232, 755 255" class="arrow"/>

  <!-- State -> Models -->
  <path d="M897.5 217 V250" class="arrow"/>

  <!-- State -> Backend API -->
  <path d="M970 171 H1080" class="arrow dash"/>
  <text x="1025" y="159" text-anchor="middle" class="small">REST / JSON</text>
</svg>