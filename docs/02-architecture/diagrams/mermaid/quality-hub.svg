<svg xmlns="http://www.w3.org/2000/svg" width="1760" height="1460" viewBox="0 0 1760 1460" role="img" aria-label="Sequenzdiagramm Quality-Hub-Lauf">
    <defs>
        <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
            <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
        </marker>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
        </filter>
    </defs>
    <rect width="1760" height="1460" fill="#FFFFFF"/>

    <text x="880.0" y="54" text-anchor="middle" font-size="30" font-weight="700" fill="#0F172A" font-family="Inter, Arial, sans-serif">Quality-Hub-Lauf</text>
    <text x="880.0" y="88" text-anchor="middle" font-size="17" font-weight="400" fill="#475569" font-family="Inter, Arial, sans-serif">Laufzeitsicht: Quality-Profil starten, Checks ausführen und Reports im Hub anzeigen</text>
    <rect x="60" y="205" width="520" height="52" rx="14" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.4" />
    <text x="320.0" y="237" text-anchor="middle" font-size="15" font-weight="700" fill="#334155" font-family="Inter, Arial, sans-serif">Start des Quality-Profils</text>
    <rect x="610" y="520" width="660" height="52" rx="14" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.4" />
    <text x="940.0" y="552" text-anchor="middle" font-size="15" font-weight="700" fill="#334155" font-family="Inter, Arial, sans-serif">Quality Runner führt Checks aus</text>
    <rect x="1180" y="1185" width="470" height="52" rx="14" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.4" />
    <text x="1415.0" y="1217" text-anchor="middle" font-size="15" font-weight="700" fill="#334155" font-family="Inter, Arial, sans-serif">Ergebnisse im Hub anzeigen</text>
    <g filter="url(#shadow)">
        <rect x="27.5" y="125" width="215" height="56" rx="14" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2" />
    </g>
    <text x="135" y="160" text-anchor="middle" font-size="15" font-weight="700" fill="#0F172A" font-family="Inter, Arial, sans-serif">Entwickler</text>
    <line x1="135" y1="181" x2="135" y2="1395" stroke="#94A3B8" stroke-width="2" stroke-dasharray="10 8" />
    <g filter="url(#shadow)">
        <rect x="322.5" y="125" width="215" height="56" rx="14" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2" />
    </g>
    <text x="430" y="160" text-anchor="middle" font-size="15" font-weight="700" fill="#0F172A" font-family="Inter, Arial, sans-serif">Docker Compose</text>
    <line x1="430" y1="181" x2="430" y2="1395" stroke="#94A3B8" stroke-width="2" stroke-dasharray="10 8" />
    <g filter="url(#shadow)">
        <rect x="637.5" y="125" width="215" height="56" rx="14" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2" />
    </g>
    <text x="745" y="160" text-anchor="middle" font-size="15" font-weight="700" fill="#0F172A" font-family="Inter, Arial, sans-serif">Quality Runner</text>
    <line x1="745" y1="181" x2="745" y2="1395" stroke="#94A3B8" stroke-width="2" stroke-dasharray="10 8" />
    <g filter="url(#shadow)">
        <rect x="937.5" y="125" width="215" height="56" rx="14" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2" />
    </g>
    <text x="1045" y="160" text-anchor="middle" font-size="15" font-weight="700" fill="#0F172A" font-family="Inter, Arial, sans-serif">Projektdateien</text>
    <line x1="1045" y1="181" x2="1045" y2="1395" stroke="#94A3B8" stroke-width="2" stroke-dasharray="10 8" />
    <g filter="url(#shadow)">
        <rect x="1237.5" y="125" width="215" height="56" rx="14" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2" />
    </g>
    <text x="1345" y="160" text-anchor="middle" font-size="15" font-weight="700" fill="#0F172A" font-family="Inter, Arial, sans-serif">quality_output</text>
    <line x1="1345" y1="181" x2="1345" y2="1395" stroke="#94A3B8" stroke-width="2" stroke-dasharray="10 8" />
    <g filter="url(#shadow)">
        <rect x="1527.5" y="125" width="215" height="56" rx="14" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2" />
    </g>
    <text x="1635" y="160" text-anchor="middle" font-size="15" font-weight="700" fill="#0F172A" font-family="Inter, Arial, sans-serif">Quality Hub</text>
    <line x1="1635" y1="181" x2="1635" y2="1395" stroke="#94A3B8" stroke-width="2" stroke-dasharray="10 8" />
    <rect x="733" y="360" width="24" height="740" rx="6" fill="#DDD6FE" stroke="#7C3AED" stroke-width="1.3" />
    <rect x="1623" y="1250" width="24" height="165" rx="6" fill="#DDD6FE" stroke="#7C3AED" stroke-width="1.3" />
    <line x1="135" y1="280" x2="430" y2="280" stroke="#334155" stroke-width="2.2"  marker-end="url(#arrow)" />
    <rect x="133.8" y="240" width="297.4" height="46" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.0" />
    <text x="282.5" y="256" text-anchor="middle" font-size="14" font-weight="500" fill="#0F172A" font-family="Inter, Arial, sans-serif"><tspan x="282.5" dy="0">1. docker compose --profile quality up</tspan><tspan x="282.5" dy="18">--build</tspan></text>
    <line x1="430" y1="360" x2="745" y2="360" stroke="#334155" stroke-width="2.2"  marker-end="url(#arrow)" />
    <rect x="515.45" y="320" width="144.1" height="28" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.0" />
    <text x="587.5" y="336" text-anchor="middle" font-size="14" font-weight="500" fill="#0F172A" font-family="Inter, Arial, sans-serif"><tspan x="587.5" dy="0">2. Runner starten</tspan></text>
    <line x1="430" y1="440" x2="1635" y2="440" stroke="#334155" stroke-width="2.2"  marker-end="url(#arrow)" />
    <rect x="971.4" y="400" width="122.2" height="28" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.0" />
    <text x="1032.5" y="416" text-anchor="middle" font-size="14" font-weight="500" fill="#0F172A" font-family="Inter, Arial, sans-serif"><tspan x="1032.5" dy="0">3. Hub starten</tspan></text>
    <line x1="745" y1="610" x2="1045" y2="610" stroke="#334155" stroke-width="2.2"  marker-end="url(#arrow)" />
    <rect x="746.3" y="570" width="297.4" height="28" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.0" />
    <text x="895.0" y="586" text-anchor="middle" font-size="14" font-weight="500" fill="#0F172A" font-family="Inter, Arial, sans-serif"><tspan x="895.0" dy="0">4. Repository in Arbeitskopie kopieren</tspan></text>
    <path d="M757,705 H1030 V749 H763" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)" />
    <rect x="786.95" y="665" width="217.1" height="28" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.0" />
    <text x="895.5" y="681" text-anchor="middle" font-size="14" font-weight="500" fill="#0F172A" font-family="Inter, Arial, sans-serif"><tspan x="895.5" dy="0">5. Backend-Checks ausführen</tspan></text>
    <path d="M757,800 H1030 V844 H763" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)" />
    <rect x="783.3" y="760" width="224.4" height="28" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.0" />
    <text x="895.5" y="776" text-anchor="middle" font-size="14" font-weight="500" fill="#0F172A" font-family="Inter, Arial, sans-serif"><tspan x="895.5" dy="0">6. Frontend-Checks ausführen</tspan></text>
    <path d="M757,895 H1030 V939 H763" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)" />
    <rect x="783.3" y="855" width="224.4" height="28" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.0" />
    <text x="895.5" y="871" text-anchor="middle" font-size="14" font-weight="500" fill="#0F172A" font-family="Inter, Arial, sans-serif"><tspan x="895.5" dy="0">7. Security-Checks ausführen</tspan></text>
    <path d="M757,990 H1090 V1034 H763" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)" />
    <rect x="795.05" y="950" width="260.9" height="28" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.0" />
    <text x="925.5" y="966" text-anchor="middle" font-size="14" font-weight="500" fill="#0F172A" font-family="Inter, Arial, sans-serif"><tspan x="925.5" dy="0">8. Playwright-E2E-Tests ausführen</tspan></text>
    <line x1="745" y1="1095" x2="1345" y2="1095" stroke="#334155" stroke-width="2.2"  marker-end="url(#arrow)" />
    <rect x="899.95" y="1055" width="290.09999999999997" height="46" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.0" />
    <text x="1045.0" y="1071" text-anchor="middle" font-size="14" font-weight="500" fill="#0F172A" font-family="Inter, Arial, sans-serif"><tspan x="1045.0" dy="0">9. report.json, Logs und HTML-Reports</tspan><tspan x="1045.0" dy="18">schreiben</tspan></text>
    <line x1="1635" y1="1250" x2="1345" y2="1250" stroke="#334155" stroke-width="2.2"  marker-end="url(#arrow)" />
    <rect x="1407.0" y="1210" width="166.0" height="28" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.0" />
    <text x="1490.0" y="1226" text-anchor="middle" font-size="14" font-weight="500" fill="#0F172A" font-family="Inter, Arial, sans-serif"><tspan x="1490.0" dy="0">10. Ergebnisse lesen</tspan></text>
    <line x1="1345" y1="1330" x2="1635" y2="1330" stroke="#334155" stroke-width="2.2" stroke-dasharray="8 8" marker-end="url(#arrow)" />
    <rect x="1377.8" y="1290" width="224.4" height="28" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.0" />
    <text x="1490.0" y="1306" text-anchor="middle" font-size="14" font-weight="500" fill="#0F172A" font-family="Inter, Arial, sans-serif"><tspan x="1490.0" dy="0">11. Status, Logs und Reports</tspan></text>
    <line x1="1635" y1="1415" x2="135" y2="1415" stroke="#334155" stroke-width="2.2" stroke-dasharray="8 8" marker-end="url(#arrow)" />
    <rect x="754.55" y="1375" width="260.9" height="46" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.0" />
    <text x="885.0" y="1391" text-anchor="middle" font-size="14" font-weight="500" fill="#0F172A" font-family="Inter, Arial, sans-serif"><tspan x="885.0" dy="0">12. Score, Checkliste und Reports</tspan><tspan x="885.0" dy="18">anzeigen</tspan></text>
    <rect x="360" y="1398" width="1060" height="46" rx="14" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.4" />
    <text x="890" y="1428" text-anchor="middle" font-size="15" font-weight="600" fill="#334155" font-family="Inter, Arial, sans-serif">Der Quality Hub bündelt Tests, Security-Checks und Reports, damit die Qualitätssicherung reproduzierbar und sichtbar bleibt.</text>
</svg>