<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="470" viewBox="0 0 1120 470" role="img" aria-labelledby="title desc">
  <title id="title">C4 Level 3 Backend Components</title>
  <desc id="desc">Backend-Komponentendiagramm für das Spring Boot Backend mit PokeAPI und Open-Meteo Integration.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#344054"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}
      .group{fill:#fff;stroke:#98a2b3;stroke-width:2;stroke-dasharray:8 6;rx:16}
      .box{fill:#eef2ff;stroke:#4357ad;stroke-width:2;rx:10}
      .frontend{fill:#e7f8ef;stroke:#138a4e;stroke-width:2;rx:12}
      .external{fill:#f4e7ff;stroke:#7a3fb0;stroke-width:2;rx:12}
      .db{fill:#fff5e8;stroke:#b65f00;stroke-width:2}
      .title{font:700 24px Arial,sans-serif;fill:#101828}
      .label{font:700 15px Arial,sans-serif;fill:#101828}
      .small{font:12px Arial,sans-serif;fill:#475467}
      .arrow{stroke:#344054;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .dash{stroke-dasharray:7 6}
    </style>
  </defs>

  <rect class="bg" width="1120" height="470"/>
  <text x="40" y="45" class="title">Level 3: Backend Component View</text>

  <!-- Frontend -->
  <rect x="40" y="170" width="155" height="72" class="frontend"/>
  <text x="117.5" y="198" text-anchor="middle" class="label">Angular Frontend</text>
  <text x="117.5" y="218" text-anchor="middle" class="small">REST JSON</text>

  <!-- Backend Group -->
  <rect x="250" y="80" width="620" height="295" class="group"/>
  <text x="275" y="110" class="label">Spring Boot Backend</text>

  <!-- Backend Components -->
  <rect x="300" y="150" width="135" height="70" class="box"/>
  <text x="367.5" y="177" text-anchor="middle" class="label">Controller</text>
  <text x="367.5" y="197" text-anchor="middle" class="small">REST-Endpunkte</text>

  <rect x="500" y="145" width="145" height="80" class="box"/>
  <text x="572.5" y="172" text-anchor="middle" class="label">Service</text>
  <text x="572.5" y="192" text-anchor="middle" class="small">Businesslogik</text>

  <rect x="705" y="145" width="135" height="80" class="box"/>
  <text x="772.5" y="171" text-anchor="middle" class="label">Domain</text>
  <text x="772.5" y="191" text-anchor="middle" class="small">
    <tspan x="772.5" dy="0">User, Task,</tspan>
    <tspan x="772.5" dy="14">Pokemon, Weather</tspan>
  </text>

  <rect x="300" y="270" width="135" height="70" class="box"/>
  <text x="367.5" y="297" text-anchor="middle" class="label">Config / Security</text>
  <text x="367.5" y="317" text-anchor="middle" class="small">Auth, CORS</text>

  <rect x="500" y="270" width="145" height="70" class="box"/>
  <text x="572.5" y="297" text-anchor="middle" class="label">Repository</text>
  <text x="572.5" y="317" text-anchor="middle" class="small">Spring Data JPA</text>

  <rect x="705" y="265" width="135" height="80" class="box"/>
  <text x="772.5" y="292" text-anchor="middle" class="label">Integration</text>
  <text x="772.5" y="312" text-anchor="middle" class="small">
    <tspan x="772.5" dy="0">PokeAPI Client,</tspan>
    <tspan x="772.5" dy="14">Open-Meteo Client</tspan>
  </text>

  <!-- External systems -->
  <ellipse cx="572.5" cy="425" rx="80" ry="36" class="db"/>
  <text x="572.5" y="421" text-anchor="middle" class="label">PostgreSQL</text>
  <text x="572.5" y="440" text-anchor="middle" class="small">Persistenz</text>

  <rect x="925" y="165" width="135" height="65" class="external"/>
  <text x="992.5" y="191" text-anchor="middle" class="label">PokeAPI</text>
  <text x="992.5" y="211" text-anchor="middle" class="small">Pokemon-Daten</text>

  <rect x="925" y="285" width="135" height="65" class="external"/>
  <text x="992.5" y="311" text-anchor="middle" class="label">Open-Meteo</text>
  <text x="992.5" y="331" text-anchor="middle" class="small">Wetterdaten</text>

  <!-- Arrows -->
  <path d="M195 206 H300" class="arrow"/>
  <text x="247" y="194" text-anchor="middle" class="small">REST JSON</text>

  <path d="M435 185 H500" class="arrow"/>
  <path d="M645 185 H705" class="arrow"/>

  <path d="M367.5 270 V220" class="arrow dash"/>
  <text x="392" y="250" text-anchor="middle" class="small">schützt</text>

  <path d="M572.5 225 V270" class="arrow"/>
  <path d="M645 305 H705" class="arrow"/>

  <path d="M572.5 340 V389" class="arrow"/>
  <text x="600" y="367" text-anchor="middle" class="small">JPA JDBC</text>

  <path d="M840 292 C875 255,890 198,925 198" class="arrow"/>
  <text x="885" y="225" text-anchor="middle" class="small">HTTPS JSON</text>

  <path d="M840 318 C875 335,890 318,925 318" class="arrow"/>
  <text x="885" y="347" text-anchor="middle" class="small">HTTPS JSON</text>
</svg>