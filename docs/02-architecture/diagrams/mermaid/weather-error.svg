<svg xmlns="http://www.w3.org/2000/svg" width="1580" height="1240" viewBox="0 0 1580 1240" role="img" aria-label="Sequenzdiagramm Wetter-Fehlerfall">
    <defs>
        <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
            <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
        </marker>
        <marker id="errorArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
            <path d="M2,2 L10,6 L2,10 Z" fill="#DC2626"/>
        </marker>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
        </filter>
    </defs>
    <rect width="1580" height="1240" fill="#FFFFFF"/>

    <text x="790.0" y="54" text-anchor="middle" font-size="30" font-weight="700" fill="#0F172A" font-family="Inter, Arial, sans-serif">Wetter-Fehlerfall</text>
    <text x="790.0" y="88" text-anchor="middle" font-size="17" font-weight="400" fill="#475569" font-family="Inter, Arial, sans-serif">Laufzeitsicht: Fehler bei Open-Meteo, Fallback im Backend und Standard-Szene im Frontend</text>
    <rect x="55" y="205" width="430" height="52" rx="14" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1.4" />
    <text x="270.0" y="237" text-anchor="middle" font-size="15" font-weight="700" fill="#334155" font-family="Inter, Arial, sans-serif">Frontend: Dashboard öffnen</text>
    <rect x="660" y="430" width="770" height="52" rx="14" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.4" />
    <text x="1045.0" y="462" text-anchor="middle" font-size="15" font-weight="700" fill="#334155" font-family="Inter, Arial, sans-serif">Backend: Fehler behandeln und Fallback liefern</text>
    <rect x="250" y="995" width="520" height="52" rx="14" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.4" />
    <text x="510.0" y="1027" text-anchor="middle" font-size="15" font-weight="700" fill="#334155" font-family="Inter, Arial, sans-serif">Frontend: Standard-Szene auswählen</text>
    <g filter="url(#shadow)">
        <rect x="15.0" y="125" width="210" height="56" rx="14" fill="#E0F2FE" stroke="#0284C7" stroke-width="2" />
    </g>
    <text x="120" y="160" text-anchor="middle" font-size="15" font-weight="700" fill="#0F172A" font-family="Inter, Arial, sans-serif">Nutzer</text>
    <line x1="120" y1="181" x2="120" y2="1175" stroke="#94A3B8" stroke-width="2" stroke-dasharray="10 8" />
    <g filter="url(#shadow)">
        <rect x="315.0" y="125" width="210" height="56" rx="14" fill="#E0F2FE" stroke="#0284C7" stroke-width="2" />
    </g>
    <text x="420" y="160" text-anchor="middle" font-size="15" font-weight="700" fill="#0F172A" font-family="Inter, Arial, sans-serif">Angular-Frontend</text>
    <line x1="420" y1="181" x2="420" y2="1175" stroke="#94A3B8" stroke-width="2" stroke-dasharray="10 8" />
    <g filter="url(#shadow)">
        <rect x="655.0" y="125" width="210" height="56" rx="14" fill="#E0F2FE" stroke="#0284C7" stroke-width="2" />
    </g>
    <text x="760" y="160" text-anchor="middle" font-size="15" font-weight="700" fill="#0F172A" font-family="Inter, Arial, sans-serif">Spring-Boot-Backend</text>
    <line x1="760" y1="181" x2="760" y2="1175" stroke="#94A3B8" stroke-width="2" stroke-dasharray="10 8" />
    <g filter="url(#shadow)">
        <rect x="975.0" y="125" width="210" height="56" rx="14" fill="#E0F2FE" stroke="#0284C7" stroke-width="2" />
    </g>
    <text x="1080" y="160" text-anchor="middle" font-size="15" font-weight="700" fill="#0F172A" font-family="Inter, Arial, sans-serif">WeatherService</text>
    <line x1="1080" y1="181" x2="1080" y2="1175" stroke="#94A3B8" stroke-width="2" stroke-dasharray="10 8" />
    <g filter="url(#shadow)">
        <rect x="1305.0" y="125" width="210" height="56" rx="14" fill="#E0F2FE" stroke="#0284C7" stroke-width="2" />
    </g>
    <text x="1410" y="160" text-anchor="middle" font-size="15" font-weight="700" fill="#0F172A" font-family="Inter, Arial, sans-serif">Open-Meteo</text>
    <line x1="1410" y1="181" x2="1410" y2="1175" stroke="#94A3B8" stroke-width="2" stroke-dasharray="10 8" />
    <rect x="748" y="355" width="24" height="590" rx="6" fill="#BAE6FD" stroke="#0284C7" stroke-width="1.3" />
    <rect x="1068" y="505" width="24" height="360" rx="6" fill="#CFFAFE" stroke="#0284C7" stroke-width="1.3" />
    <rect x="1398" y="585" width="24" height="80" rx="6" fill="#FECACA" stroke="#DC2626" stroke-width="1.3" />
    <line x1="120" y1="275" x2="420" y2="275" stroke="#334155" stroke-width="2.2"  marker-end="url(#arrow)" />
    <rect x="191.6" y="235" width="156.8" height="28" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.0" />
    <text x="270.0" y="251" text-anchor="middle" font-size="14" font-weight="500" fill="#0F172A" font-family="Inter, Arial, sans-serif"><tspan x="270.0" dy="0">1. Dashboard öffnen</tspan></text>
    <line x1="420" y1="355" x2="760" y2="355" stroke="#334155" stroke-width="2.2"  marker-end="url(#arrow)" />
    <rect x="511.6" y="315" width="156.8" height="28" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.0" />
    <text x="590.0" y="331" text-anchor="middle" font-size="14" font-weight="500" fill="#0F172A" font-family="Inter, Arial, sans-serif"><tspan x="590.0" dy="0">2. GET /api/weather</tspan></text>
    <line x1="760" y1="505" x2="1080" y2="505" stroke="#334155" stroke-width="2.2"  marker-end="url(#arrow)" />
    <rect x="823.6" y="465" width="192.8" height="28" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.0" />
    <text x="920.0" y="481" text-anchor="middle" font-size="14" font-weight="500" fill="#0F172A" font-family="Inter, Arial, sans-serif"><tspan x="920.0" dy="0">3. Wetterdaten anfordern</tspan></text>
    <line x1="1080" y1="585" x2="1410" y2="585" stroke="#334155" stroke-width="2.2"  marker-end="url(#arrow)" />
    <rect x="1155.8" y="545" width="178.4" height="28" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.0" />
    <text x="1245.0" y="561" text-anchor="middle" font-size="14" font-weight="500" fill="#0F172A" font-family="Inter, Arial, sans-serif"><tspan x="1245.0" dy="0">4. Wetterdaten abrufen</tspan></text>
    <line x1="1410" y1="665" x2="1080" y2="665" stroke="#DC2626" stroke-width="2.4" stroke-dasharray="8 8" marker-end="url(#errorArrow)" />
    <rect x="1155.8" y="625" width="178.4" height="28" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.0" />
    <text x="1245.0" y="641" text-anchor="middle" font-size="14" font-weight="500" fill="#0F172A" font-family="Inter, Arial, sans-serif"><tspan x="1245.0" dy="0">5. Timeout oder Fehler</tspan></text>
    <path d="M1092,770 H1330 V814 H1098" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)" />
    <rect x="1134.6" y="730" width="156.8" height="28" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.0" />
    <text x="1213.0" y="746" text-anchor="middle" font-size="14" font-weight="500" fill="#0F172A" font-family="Inter, Arial, sans-serif"><tspan x="1213.0" dy="0">6. Fehler behandeln</tspan></text>
    <line x1="1080" y1="865" x2="760" y2="865" stroke="#334155" stroke-width="2.2" stroke-dasharray="8 8" marker-end="url(#arrow)" />
    <rect x="823.6" y="825" width="192.8" height="28" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.0" />
    <text x="920.0" y="841" text-anchor="middle" font-size="14" font-weight="500" fill="#0F172A" font-family="Inter, Arial, sans-serif"><tspan x="920.0" dy="0">7. Fallback-Wettermodell</tspan></text>
    <line x1="760" y1="945" x2="420" y2="945" stroke="#334155" stroke-width="2.2" stroke-dasharray="8 8" marker-end="url(#arrow)" />
    <rect x="490.0" y="905" width="200.0" height="28" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.0" />
    <text x="590.0" y="921" text-anchor="middle" font-size="14" font-weight="500" fill="#0F172A" font-family="Inter, Arial, sans-serif"><tspan x="590.0" dy="0">8. Standard-Wetterzustand</tspan></text>
    <path d="M432,1065 H750 V1109 H438" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)" />
    <rect x="464.2" y="1025" width="257.6" height="28" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.0" />
    <text x="593.0" y="1041" text-anchor="middle" font-size="14" font-weight="500" fill="#0F172A" font-family="Inter, Arial, sans-serif"><tspan x="593.0" dy="0">9. Standard-Hintergrund auswählen</tspan></text>
    <line x1="420" y1="1155" x2="120" y2="1155" stroke="#334155" stroke-width="2.2" stroke-dasharray="8 8" marker-end="url(#arrow)" />
    <rect x="152.0" y="1115" width="236.0" height="28" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.0" />
    <text x="270.0" y="1131" text-anchor="middle" font-size="14" font-weight="500" fill="#0F172A" font-family="Inter, Arial, sans-serif"><tspan x="270.0" dy="0">10. Dashboard bleibt benutzbar</tspan></text>
    <rect x="315" y="1178" width="980" height="46" rx="14" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.4" />
    <text x="805" y="1208" text-anchor="middle" font-size="15" font-weight="600" fill="#334155" font-family="Inter, Arial, sans-serif">Bei Timeout oder Fehler liefert das Backend einen Fallback, damit das Dashboard trotzdem benutzbar bleibt.</text>
</svg>