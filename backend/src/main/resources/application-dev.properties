# -------------------------------------------------------
# Development-profile overrides
# -------------------------------------------------------

# Database (local dev)
spring.datasource.url=jdbc:postgresql://localhost:5432/sqs_db
spring.datasource.username=sqs_user
spring.datasource.password=sqs_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Local Angular dev server runs over HTTP; secure cookies would not be stored.
server.servlet.session.cookie.secure=false

# Logging (verbose for development)
logging.level.root=DEBUG
logging.level.com.example.app=TRACE
