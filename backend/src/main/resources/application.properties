# -------------------------------------------------------
# Application configuration ? fill in values as needed
# -------------------------------------------------------

# Server
server.port=8181

# Session settings
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:true}
server.servlet.session.cookie.same-site=lax

# Database (replace with actual connection details)
spring.datasource.url=jdbc:postgresql://localhost:5432/sqs_db
spring.datasource.username=
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# External API (replace with actual base URL and credentials)
external.api.base-url=
external.api.key=
pokeapi.base-url=https://pokeapi.co/api/v2
pokeapi.enabled=true
weather.forecast-base-url=https://api.open-meteo.com/v1/forecast
weather.geocoding-base-url=https://geocoding-api.open-meteo.com/v1/search

# Logging
logging.level.root=INFO
logging.level.com.example.app=DEBUG
