# -------------------------------------------------------
# Test-profile overrides (H2 in-memory database)
# -------------------------------------------------------

# Use an in-memory database for tests so no external DB is required
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable external API calls during tests
external.api.base-url=http://localhost:8089
external.api.key=test-api-key

# Logging
logging.level.root=WARN
logging.level.com.example.app=INFO
