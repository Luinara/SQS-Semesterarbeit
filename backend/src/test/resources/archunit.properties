# ArchUnit global configuration
# See https://www.archunit.org/userguide/html/000_Index.html#_configuration_properties

# Allow architecture rules to pass when no classes match the predicate (empty-should clause).
# This is necessary while the codebase is still growing: e.g. the controller-layering rule
# passes vacuously until the first @RestController class is added.
# Set to "true" to re-enable strict mode once the relevant packages are populated.
archRule.failOnEmptyShould=false
