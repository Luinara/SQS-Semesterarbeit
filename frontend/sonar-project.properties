# SonarQube / SonarCloud configuration for the frontend module.
# This file is used by the sonarsource/sonarqube-scan-action in the CI pipeline.
# Backend analysis is handled separately by the Maven SonarQube plugin (pom.xml).
#
# Required secrets in GitHub Actions:
#   SONAR_TOKEN     – SonarQube / SonarCloud authentication token
#   SONAR_HOST_URL  – Server URL (e.g. https://sonarcloud.io)

sonar.projectKey=sqs-semesterarbeit-frontend
sonar.projectName=SQS Semesterarbeit – Frontend

# Analyse only the source directory; exclude generated and dependency artefacts
sonar.sources=src
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/playwright-report/**

# Coverage report generated by "npm run test:coverage" (Vitest + @vitest/coverage-v8)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8
