<header class="top-bar">
  <div class="top-bar__brand">
    <span class="top-bar__logo">SQS</span>

    <div>
      <p class="top-bar__eyebrow">PKM API Task Companion</p>
      <h1>Pokemon Task Dashboard</h1>
    </div>
  </div>

  <div class="top-bar__meta">
    <div class="top-bar__pill">
      <span class="top-bar__avatar" aria-hidden="true">{{ userInitial() }}</span>
      <div>
        <strong>{{ userName() }}</strong>
        <span>{{ completedTasks() }}/{{ totalTasks() }} Backend-Tasks erledigt</span>
      </div>
    </div>

    <div class="top-bar__pill top-bar__pill--soft">
      <strong>{{ availableFoodPoints() }}</strong>
      <span>Trainingspunkte</span>
    </div>

    <button sqsButton size="sm" variant="secondary" (click)="requestReset()">
      Demo reset
    </button>
    <button sqsButton size="sm" variant="ghost" (click)="requestLogout()">Abmelden</button>
  </div>
</header>
