<section class="hydration-card">
  <div class="hydration-card__copy">
    <span class="eyebrow">Wasser Heute</span>
    <h3>{{ currentMl() }} / {{ goalMl() }} ml</h3>
    <p>
      @if (remainingMl() > 0) {
        Noch {{ remainingMl() }} ml bis zum Tagesziel.
      } @else {
        Tagesziel erreicht. Dein Pet feiert den Wasser-Flow.
      }
    </p>
  </div>

  <div class="hydration-card__gauge" aria-label="Wasserfortschritt">
    <div class="hydration-card__water" [style.height]="waterLevel()"></div>
    <strong>{{ progressPercent() }}%</strong>
  </div>

  <div class="hydration-card__actions">
    @for (amountMl of quickAddMl; track amountMl) {
      <button sqsButton size="sm" variant="secondary" (click)="addWater(amountMl)">
        +{{ amountMl }} ml
      </button>
    }
  </div>
</section>
