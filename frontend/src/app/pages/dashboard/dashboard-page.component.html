@if (appState.user(); as currentUser) {
  <section class="dashboard-page page-shell">
    <sqs-top-bar
      [userName]="currentUser.userName"
      [availableFoodPoints]="appState.pet()?.availableFoodPoints ?? 0"
      [completedTasks]="appState.completedTaskCount()"
      [totalTasks]="appState.totalTaskCount()"
      (resetRequested)="resetDemoData()"
      (logoutRequested)="logout()"
    />

    <div class="dashboard-page__layout">
      <aside class="dashboard-page__sidebar">
        <sqs-task-list
          [tasks]="appState.tasks()"
          [availableFoodPoints]="appState.pet()?.availableFoodPoints ?? 0"
          [qualityQuestProgress]="appState.qualityQuestProgress()"
          (taskCompleted)="completeTask($event)"
        />
      </aside>

      <section class="dashboard-page__content">
        <sqs-quality-gate-card
          [tasks]="appState.tasks()"
          [qualityScore]="appState.qualityScore()"
          [qualityTarget]="appState.qualityTarget()"
        />

        <sqs-pet-card
          [pet]="appState.pet()"
          [completedTasks]="appState.completedTaskCount()"
          [totalTasks]="appState.totalTaskCount()"
          [weatherScene]="weather.scene()"
          [weatherSnapshot]="weather.snapshot()"
          [weatherLoading]="weather.isLoading()"
          [weatherError]="weather.errorMessage()"
          [petCareState]="appState.petCareState()"
          [gameFeedback]="appState.lastGameFeedback()"
          [pokemon]="pokemon.snapshot()"
          [pokemonLoading]="pokemon.isLoading()"
          [pokemonSourceLabel]="pokemon.sourceLabel()"
          (feedRequested)="feedPet()"
          (weatherRefreshRequested)="refreshWeather()"
          (weatherCitySubmitted)="searchWeatherCity($event)"
        />
      </section>
    </div>
  </section>
}
