<form class="auth-form" [formGroup]="form" (ngSubmit)="submitForm()" novalidate>
  <div class="auth-form__field">
    <label for="username">Backend-Username</label>
    <input
      id="username"
      type="text"
      formControlName="username"
      autocomplete="username"
      placeholder="demo"
    />

    @if (shouldShowError(form.controls.username)) {
      <p class="auth-form__error">{{ usernameErrorText() }}</p>
    }
  </div>

  <div class="auth-form__field">
    <label for="password">Passwort</label>
    <input
      id="password"
      type="password"
      formControlName="password"
      [attr.autocomplete]="mode() === 'register' ? 'new-password' : 'current-password'"
      [placeholder]="mode() === 'register' ? 'Mindestens 8 Zeichen' : 'Passwort'"
    />

    @if (shouldShowError(form.controls.password)) {
      <p class="auth-form__error">{{ passwordErrorText() }}</p>
    }
  </div>

  @if (feedbackMessage()) {
    <div class="auth-form__feedback" [class.auth-form__feedback--error]="hasError()">
      {{ feedbackMessage() }}
    </div>
  }

  <button sqsButton type="submit" [fullWidth]="true">
    {{ mode() === 'register' ? 'Profil anlegen und starten' : 'Einloggen und weitermachen' }}
  </button>
</form>
