<div
  class="stat-badge"
  [class.stat-badge--green]="tone() === 'green'"
  [class.stat-badge--amber]="tone() === 'amber'"
  [class.stat-badge--rose]="tone() === 'rose'"
  [class.stat-badge--slate]="tone() === 'slate'"
  [class.stat-badge--long-value]="hasLongValue()"
>
  <span class="stat-badge__icon" aria-hidden="true">
    @switch (icon()) {
      @case ('hearts') {
        <svg class="stat-badge__glyph stat-badge__glyph--heart" viewBox="0 0 20 20">
          <path
            d="M10 17.1 8.75 16C4.3 12.08 2 9.96 2 7.35 2 5.22 3.65 3.6 5.78 3.6c1.2 0 2.36.56 3.12 1.44.28.32.62.32.9 0A4.18 4.18 0 0 1 12.92 3.6C15.05 3.6 16.7 5.22 16.7 7.35c0 2.61-2.3 4.73-6.75 8.65L10 17.1Z"
          />
        </svg>
      }
      @case ('berries') {
        <svg class="stat-badge__glyph" viewBox="0 0 20 20">
          <path d="M12 8.5c-3.8 0-6.5 2.6-6.5 6.1S8.2 21 12 21s6.5-2.7 6.5-6.4S15.8 8.5 12 8.5Z" />
          <path
            d="M11.9 4c1.8 0 3.3 0.8 4.4 2.3-2.1 0.2-3.8 1.1-5 2.5C10.5 7.1 9.3 6 7.7 5.5 8.8 4.5 10.2 4 11.9 4Z"
          />
        </svg>
      }
      @case ('tasks') {
        <svg class="stat-badge__glyph stat-badge__glyph--square" viewBox="0 0 20 20">
          <path d="M5 5h10v10H5V5Z" />
        </svg>
      }
      @case ('pokemon') {
        <svg class="stat-badge__glyph stat-badge__glyph--circle" viewBox="0 0 20 20">
          <circle cx="10" cy="10" r="5.8" />
        </svg>
      }
      @default {
        <svg class="stat-badge__glyph stat-badge__glyph--star" viewBox="0 0 20 20">
          <path d="m10 2.7 2.05 4.15 4.58.66-3.31 3.23.78 4.56L10 13.15 5.9 15.3l.78-4.56-3.31-3.23 4.58-.66L10 2.7Z" />
        </svg>
      }
    }
  </span>

  <div class="stat-badge__content">
    <span class="stat-badge__value">{{ value() }}</span>
    <span class="stat-badge__label">{{ label() }}</span>
  </div>
</div>
