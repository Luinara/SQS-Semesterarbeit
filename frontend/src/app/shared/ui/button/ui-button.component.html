<button
  class="ui-button"
  [attr.type]="type()"
  [disabled]="disabled()"
  [class.ui-button--secondary]="variant() === 'secondary'"
  [class.ui-button--ghost]="variant() === 'ghost'"
  [class.ui-button--soft]="variant() === 'soft'"
  [class.ui-button--small]="size() === 'sm'"
  [class.ui-button--full-width]="fullWidth()"
  (click)="handleClick($event)"
>
  <ng-content />
</button>
