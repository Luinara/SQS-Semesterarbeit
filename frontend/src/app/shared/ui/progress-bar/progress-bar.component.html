<div class="progress-bar">
  <div class="progress-bar__header">
    <span class="progress-bar__label">{{ label() }}</span>
    <span class="progress-bar__hint">{{ hint() }}</span>
  </div>

  <progress
    class="progress-bar__native"
    [attr.aria-label]="label()"
    [value]="value()"
    [max]="max()"
  ></progress>

  <div class="progress-bar__track" aria-hidden="true">
    <span class="progress-bar__fill" [style.width.%]="percentage()"></span>
  </div>
</div>
