services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sqs_db
      POSTGRES_USER: sqs_user
      POSTGRES_PASSWORD: sqs_password
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/sqs_db
      SPRING_DATASOURCE_USERNAME: sqs_user
      SPRING_DATASOURCE_PASSWORD: sqs_password
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "${BACKEND_PORT:-8181}:8181"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

  quality-runner:
    profiles:
      - quality
    build:
      context: .
      dockerfile: quality/Dockerfile.runner
    restart: "no"
    environment:
      QUALITY_SOURCE_DIR: /workspace
      QUALITY_WORK_DIR: /work/repo
      QUALITY_OUTPUT_DIR: /quality-output
    volumes:
      - .:/workspace:ro
      - quality_output:/quality-output
    depends_on:
      - backend
      - frontend

  quality-hub:
    profiles:
      - quality
    build:
      context: .
      dockerfile: quality/Dockerfile.hub
    restart: unless-stopped
    ports:
      - "${QUALITY_HUB_PORT:-8088}:80"
    volumes:
      - quality_output:/usr/share/nginx/html/reports:ro

volumes:
  db_data:
  quality_output:
