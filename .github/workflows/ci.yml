# CI Pipeline – SQS Self-Care Companion
#
# Job dependency graph:
#
#   backend-build ──► backend-test ──► backend-analyze ──────────────┐
#                          │                                         ├──► sonarqube
#   frontend-build ─┬─► frontend-test ──► (coverage artifact) ───────┤
#                   └─► frontend-analyze ────────────────────────────┘
#
#   backend-test + frontend-test ──► e2e
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SONAR_TOKEN     – SonarQube / SonarCloud authentication token
#   SONAR_HOST_URL  – SonarQube server URL (e.g. https://sonarcloud.io)
#                     Both secrets must be set; analysis is skipped if either is absent.

name: CI

on:
  push:
    branches: [main, develop, unlimitedgaming]
  pull_request:
    branches: [main, develop]

# Restrict default GITHUB_TOKEN permissions to the minimum required.
permissions:
  contents: read

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # BACKEND
  # ──────────────────────────────────────────────────────────────────────────

  backend-build:
    name: 'Backend – Build'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Compile
        run: mvn --batch-mode --no-transfer-progress clean compile -DskipTests

  # ──────────────────────────────────────────────────────────────────────────

  backend-test:
    name: 'Backend – Unit & Integration Tests'
    runs-on: ubuntu-latest
    needs: backend-build
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # Run the full backend verification so Surefire unit tests, Failsafe integration
      # tests and the JaCoCo report are generated by the same lifecycle.
      - name: Run unit and integration tests
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Verify JaCoCo report was generated
        id: verify-jacoco
        run: |
          if [ -f target/site/jacoco/jacoco.xml ]; then
            echo "✓ JaCoCo report exists"
            ls -lah target/site/jacoco/jacoco.xml
            wc -c target/site/jacoco/jacoco.xml
            echo "jacoco_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "❌ ERROR: JaCoCo report NOT found at target/site/jacoco/jacoco.xml"
            echo "Listing target/site directory:"
            ls -lah target/site || true
            echo "Listing target/site/jacoco directory:"
            ls -lah target/site/jacoco || echo "Directory does not exist"
            echo "jacoco_exists=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v7
        with:
          name: backend-jacoco-report
          path: target/site/jacoco/jacoco.xml
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────

  backend-analyze:
    name: 'Backend – Checkstyle & SpotBugs'
    runs-on: ubuntu-latest
    needs: backend-test
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Checkstyle
        run: mvn --batch-mode --no-transfer-progress checkstyle:check

      - name: SpotBugs
        run: mvn --batch-mode --no-transfer-progress compile spotbugs:check

  # ──────────────────────────────────────────────────────────────────────────
  # FRONTEND
  # ──────────────────────────────────────────────────────────────────────────

  frontend-build:
    name: 'Frontend – Build & Type Check'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run type-check

      - name: Production build
        run: npm run build

  # ──────────────────────────────────────────────────────────────────────────

  frontend-test:
    name: 'Frontend – Unit Tests & Coverage'
    runs-on: ubuntu-latest
    needs: frontend-build
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Verify frontend coverage report
        run: |
          if [ -f coverage/lcov.info ]; then
            echo "✓ Frontend coverage report exists"
            ls -lah coverage/lcov.info
            wc -c coverage/lcov.info
          else
            echo "⚠️ Frontend coverage report not found at coverage/lcov.info"
            echo "Listing coverage directory:"
            ls -lah coverage || echo "Directory does not exist"
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage-report
          path: coverage
          retention-days: 30
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────────────────

  frontend-analyze:
    name: 'Frontend – Lint & Format'
    runs-on: ubuntu-latest
    needs: frontend-build
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

  # ──────────────────────────────────────────────────────────────────────────
  # SONARQUBE – single analysis for the whole repository
  # ──────────────────────────────────────────────────────────────────────────

  sonarqube:
    name: 'SonarQube Analysis'
    runs-on: ubuntu-latest
    if: success()
    # Needs the analyze jobs (so Checkstyle/SpotBugs/ESLint/Prettier pass first)
    # and the test jobs (which upload the coverage artifacts consumed below).
    needs: [backend-test, backend-analyze, frontend-analyze, frontend-test]

    steps:
      - uses: actions/checkout@v6
        with:
          # Full history is required for accurate SonarQube blame data and
          # new-code detection on pull requests.
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Download coverage artifacts FIRST, before compiling or installing dependencies.
      # SonarScanner must find these reports in their configured locations.
      - name: Download JaCoCo coverage report
        id: download-jacoco
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          name: backend-jacoco-report
          path: backend/target/site/jacoco

      - name: Download frontend coverage report
        id: download-frontend-coverage
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          name: frontend-coverage-report
          path: frontend/coverage

      - name: Verify JaCoCo artifact
        run: |
          if [ -f backend/target/site/jacoco/jacoco.xml ]; then
            echo "✓ JaCoCo report successfully downloaded"
            ls -lah backend/target/site/jacoco/jacoco.xml
            wc -c backend/target/site/jacoco/jacoco.xml
          else
            echo "❌ WARNING: JaCoCo artifact not found at backend/target/site/jacoco/jacoco.xml"
            echo "SonarCloud will analyze without backend coverage data."
            ls -lah backend/target/site/jacoco/ 2>/dev/null || echo "Directory does not exist"
          fi

      - name: Verify frontend coverage artifact
        run: |
          if [ -f frontend/coverage/lcov.info ]; then
            echo "✓ Frontend coverage report successfully downloaded"
            ls -lah frontend/coverage/lcov.info
            echo "File size:"
            wc -c frontend/coverage/lcov.info
          else
            echo "⚠️ Frontend coverage artifact not found – SonarCloud will analyze without frontend coverage data"
            echo "Directory contents:"
            ls -lah frontend/coverage/ || echo "Directory does not exist"
          fi

      # Compile the backend so SonarQube can perform bytecode analysis.
      # Tests are skipped here because coverage data comes from artifacts (now already downloaded).
      - name: Compile backend
        run: mvn --batch-mode --no-transfer-progress compile -DskipTests
        working-directory: backend

      # Install frontend dependencies so SonarQube can resolve TypeScript types.
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      # Check SonarQube secrets
      - name: Check SonarQube secrets
        id: sonar-check
        run: |
          if [ -n "$SONAR_TOKEN" ] && [ -n "$SONAR_HOST_URL" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  SONAR_TOKEN or SONAR_HOST_URL is not configured – skipping SonarQube analysis."
            echo "   Set both secrets in Settings → Secrets and variables → Actions."
          fi
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # Final check: verify both coverage files exist before SonarScanner runs
      - name: List directory structure before SonarQube scan
        run: |
          echo "=== Repository root ==="
          ls -la
          echo ""
          echo "=== Backend structure ==="
          find backend/target -type f -name "*.xml" 2>/dev/null | head -20
          echo ""
          echo "=== Frontend coverage ==="
          find frontend/coverage -type f 2>/dev/null | head -20
          echo ""
          echo "=== Verifying coverage files ==="
          echo -n "Backend JaCoCo: "
          [ -f backend/target/site/jacoco/jacoco.xml ] && echo "✓ EXISTS ($(wc -c < backend/target/site/jacoco/jacoco.xml) bytes)" || echo "✗ MISSING"
          echo -n "Frontend LCOV: "
          [ -f frontend/coverage/lcov.info ] && echo "✓ EXISTS ($(wc -c < frontend/coverage/lcov.info) bytes)" || echo "✗ MISSING"

      # Runs the SonarCloud Scanner for the entire monorepo.
      # Analyses both the Java backend and the TypeScript frontend in one pass.
      # Coverage reports are loaded from backend/target/site/jacoco/jacoco.xml and frontend/coverage/lcov.info
      - name: SonarCloud scan
        if: steps.sonar-check.outputs.configured == 'true'
        uses: sonarsource/sonarcloud-github-action@3f12c8b0d8b4d8f2a7fb4c9e6d1d2f9a2d0a1d6e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # Override paths to ensure SonarCloud finds the coverage reports
          SONARQUBE_SCANNER_PARAMS: -Dsonar.projectBaseDir=. -Dsonar.sources=backend/src/main/java,frontend/src -Dsonar.tests=backend/src/test/java,tests/unit -Dsonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info -Dsonar.java.binaries=backend/target/classes

  # ──────────────────────────────────────────────────────────────────────────
  # END-TO-END TESTS
  # ──────────────────────────────────────────────────────────────────────────

  e2e:
    name: 'End-to-End Tests (Playwright)'
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 14
