# CI Pipeline – SQS Self-Care Companion
#
# Stages: build → test → analyze
#
# To extend this pipeline, add new jobs below the existing ones.
# For example, add a "security-scan" job after "backend-analyze" or
# an "e2e-test" job that depends on both "backend-test" and "frontend-test".
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SONAR_TOKEN     – SonarQube / SonarCloud authentication token
#   SONAR_HOST_URL  – SonarQube server URL (e.g. https://sonarcloud.io)
#                     Leave unset to skip SonarQube analysis gracefully.

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'

# Restrict default GITHUB_TOKEN permissions to the minimum required.
# Jobs that need additional access (e.g. SonarQube PR decoration) may override
# this at the job level with a more specific `permissions` block.
permissions:
  contents: read

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # BACKEND
  # ──────────────────────────────────────────────────────────────────────────

  backend-build:
    name: 'Backend – Build'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Compile
        run: mvn --batch-mode --no-transfer-progress clean compile -DskipTests

  # ──────────────────────────────────────────────────────────────────────────

  backend-test:
    name: 'Backend – Unit & Integration Tests'
    runs-on: ubuntu-latest
    needs: backend-build
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # "verify" runs unit tests (Surefire), integration tests (Failsafe),
      # and then generates the JaCoCo coverage report.
      - name: Run tests and generate JaCoCo coverage report
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-report
          path: backend/target/site/jacoco
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────

  backend-analyze:
    name: 'Backend – Static Analysis & SonarQube'
    runs-on: ubuntu-latest
    needs: backend-test
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history required for accurate SonarQube blame data

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Checkstyle
        run: mvn --batch-mode --no-transfer-progress checkstyle:check

      - name: SpotBugs
        run: mvn --batch-mode --no-transfer-progress spotbugs:check

      - name: SonarQube analysis
        # Re-runs verify to produce fresh coverage data, then sends it to SonarQube.
        # Skips gracefully when SONAR_TOKEN is not configured.
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "⚠️  SONAR_TOKEN is not configured – skipping SonarQube analysis."
            echo "   Set SONAR_TOKEN and SONAR_HOST_URL as repository secrets to enable it."
            exit 0
          fi
          mvn --batch-mode --no-transfer-progress verify sonar:sonar \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.token="$SONAR_TOKEN"

  # ──────────────────────────────────────────────────────────────────────────
  # FRONTEND
  # ──────────────────────────────────────────────────────────────────────────

  frontend-build:
    name: 'Frontend – Build & Type Check'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        # Use "npm ci" once a package-lock.json has been committed to the repository.
        run: npm install

      - name: TypeScript type check
        run: npm run type-check

      - name: Production build
        run: npm run build

  # ──────────────────────────────────────────────────────────────────────────

  frontend-test:
    name: 'Frontend – Unit Tests & Coverage'
    runs-on: ubuntu-latest
    needs: frontend-build
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────

  frontend-analyze:
    name: 'Frontend – Lint, Format & SonarQube'
    runs-on: ubuntu-latest
    needs: frontend-build
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history required for accurate SonarQube blame data

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

      - name: Check SonarQube configuration
        id: sonar-check
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  SONAR_TOKEN is not configured – skipping SonarQube analysis."
            echo "   Set SONAR_TOKEN and SONAR_HOST_URL as repository secrets to enable it."
          fi
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube analysis
        if: steps.sonar-check.outputs.configured == 'true'
        uses: sonarsource/sonarqube-scan-action@v5
        with:
          projectBaseDir: frontend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
